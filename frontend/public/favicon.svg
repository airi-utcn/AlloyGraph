<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>
  </defs>
  <!-- Bonds: center to outer nodes -->
  <g stroke="url(#ag)" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="16" y1="4" x2="16" y2="16"/>
    <line x1="26.4" y1="10" x2="16" y2="16"/>
    <line x1="26.4" y1="22" x2="16" y2="16"/>
    <line x1="16" y1="28" x2="16" y2="16"/>
    <line x1="5.6" y1="22" x2="16" y2="16"/>
    <line x1="5.6" y1="10" x2="16" y2="16"/>
  </g>
  <!-- Outer ring bonds -->
  <g stroke="url(#ag)" stroke-width="1" stroke-linecap="round" opacity="0.35">
    <line x1="16" y1="4" x2="26.4" y2="10"/>
    <line x1="26.4" y1="10" x2="26.4" y2="22"/>
    <line x1="26.4" y1="22" x2="16" y2="28"/>
    <line x1="16" y1="28" x2="5.6" y2="22"/>
    <line x1="5.6" y1="22" x2="5.6" y2="10"/>
    <line x1="5.6" y1="10" x2="16" y2="4"/>
  </g>
  <!-- Center node -->
  <circle cx="16" cy="16" r="3" fill="url(#ag)"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="4" r="2" fill="url(#ag)"/>
  <circle cx="26.4" cy="10" r="2" fill="url(#ag)"/>
  <circle cx="26.4" cy="22" r="2" fill="url(#ag)"/>
  <circle cx="16" cy="28" r="2" fill="url(#ag)"/>
  <circle cx="5.6" cy="22" r="2" fill="url(#ag)"/>
  <circle cx="5.6" cy="10" r="2" fill="url(#ag)"/>
</svg>
